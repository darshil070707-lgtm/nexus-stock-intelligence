services:
  - type: web
    name: nexus-api
    runtime: docker
    plan: standard
    buildCommand: pip install -r backend/requirements.txt
    startCommand: python -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 8000
      - key: DATABASE_URL
        fromDatabase:
          name: nexus-db
          property: connectionString
      - key: MODEL_DIR
        value: /tmp/nexus_models
      - key: TELEGRAM_BOT_TOKEN
        scope: run
      - key: TELEGRAM_CHAT_ID
        scope: run
      - key: NEWS_API_KEY
        scope: run
      - key: TWILIO_ACCOUNT_SID
        scope: run
      - key: TWILIO_AUTH_TOKEN
        scope: run
      - key: WHATSAPP_TO
        scope: run

  - type: background_worker
    name: nexus-scheduler
    runtime: docker
    plan: starter
    startCommand: python backend/scheduler_runner.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nexus-db
          property: connectionString
      - key: TELEGRAM_BOT_TOKEN
        scope: run
      - key: TELEGRAM_CHAT_ID
        scope: run
      - key: TWILIO_ACCOUNT_SID
        scope: run
      - key: TWILIO_AUTH_TOKEN
        scope: run
      - key: WHATSAPP_TO
        scope: run

databases:
  - name: nexus-db
    plan: free
    databaseName: nexus
    user: nexus_user

staticSites:
  - name: nexus-frontend
    staticPublishPath: ./frontend
    buildCommand: echo "Frontend built"
    routes:
      - path: /
        destination: index.html
