<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS — Live Stock Intelligence</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #080810; color: #e8e8f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .glow-text { background: linear-gradient(135deg, #00d4ff, #7b61ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .card { background: #111120; border: 1px solid #1e1e3a; border-radius: 12px; padding: 16px; transition: border-color 0.2s, box-shadow 0.2s; }
        .card:hover { border-color: #00d4ff44; box-shadow: 0 0 20px #00d4ff11; }
        .buy-glow { border-left: 3px solid #10b981; box-shadow: -4px 0 16px #10b98122; }
        .sell-glow { border-left: 3px solid #ef4444; box-shadow: -4px 0 16px #ef444422; }
        .hold-glow { border-left: 3px solid #f59e0b; box-shadow: -4px 0 16px #f59e0b22; }
        .badge-buy { background: #10b98122; color: #10b981; border: 1px solid #10b98144; }
        .badge-sell { background: #ef444422; color: #ef4444; border: 1px solid #ef444444; }
        .badge-hold { background: #f59e0b22; color: #f59e0b; border: 1px solid #f59e0b44; }
        .tab-btn { padding: 10px 18px; border: none; background: none; color: #666; cursor: pointer; border-bottom: 2px solid transparent; font-size: 13px; font-weight: 500; transition: all 0.2s; }
        .tab-btn.active { color: #00d4ff; border-bottom-color: #00d4ff; }
        .btn-primary { background: linear-gradient(135deg, #00d4ff, #7b61ff); border: none; padding: 9px 20px; border-radius: 8px; color: white; cursor: pointer; font-weight: 600; font-size: 13px; }
        .btn-primary:hover { opacity: 0.85; }
        .score-bar-wrap { background: #1a1a2e; border-radius: 99px; height: 6px; overflow: hidden; }
        .score-bar { height: 100%; border-radius: 99px; transition: width 0.6s ease; }
        input { background: #111120; border: 1px solid #2a2a4a; border-radius: 8px; padding: 9px 14px; color: white; font-size: 14px; outline: none; }
        input:focus { border-color: #00d4ff; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0a0a15; }
        ::-webkit-scrollbar-thumb { background: #2a2a4a; border-radius: 3px; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
        .live-dot { width: 8px; height: 8px; background: #10b981; border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.3s ease; }
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const API = 'https://nexus-api-mnoq.onrender.com';
const WS_URL = 'wss://nexus-api-mnoq.onrender.com/ws';

// ── Usage tracking ────────────────────────────────────────────────────────────
const LIMITS = { api_calls: 200, stocks_analyzed: 50 };
function todayKey() { return `nx_usage_${new Date().toISOString().slice(0,10)}`; }
function getUsage() {
    try { return JSON.parse(localStorage.getItem(todayKey())) || { api_calls:0, stocks_analyzed:0, t0: Date.now() }; }
    catch { return { api_calls:0, stocks_analyzed:0, t0: Date.now() }; }
}
function bump(key) {
    const u = getUsage(); u[key] = (u[key]||0)+1;
    localStorage.setItem(todayKey(), JSON.stringify(u));
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function scoreColor(s) { return s >= 3 ? '#10b981' : s <= -2 ? '#ef4444' : '#f59e0b'; }
function scoreWidth(s) { return Math.min(100, Math.max(0, ((s + 8) / 16) * 100)); }
function fmt(n, d=2) { return n == null ? '—' : Number(n).toFixed(d); }
function currency(sig) { return sig.currency || (sig.market==='India' ? '₹' : '$'); }

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
    const [tab, setTab] = React.useState('dashboard');
    const [signals, setSignals] = React.useState([]);
    const [indices, setIndices] = React.useState({});
    const [fearGreed, setFearGreed] = React.useState(null);
    const [wsStatus, setWsStatus] = React.useState('connecting');
    const [lastUpdate, setLastUpdate] = React.useState(null);
    const [search, setSearch] = React.useState('');
    const [searchResult, setSearchResult] = React.useState(null);
    const [searchLoading, setSearchLoading] = React.useState(false);
    const [usage, setUsage] = React.useState(getUsage());

    // WebSocket
    React.useEffect(() => {
        let ws, retryTimer;
        function connect() {
            ws = new WebSocket(WS_URL);
            ws.onopen = () => { setWsStatus('live'); };
            ws.onmessage = (e) => {
                const msg = JSON.parse(e.data);
                if (msg.type === 'snapshot') {
                    setSignals(msg.data || []);
                    setLastUpdate(new Date());
                } else if (msg.type === 'signal_update') {
                    setSignals(prev => {
                        const idx = prev.findIndex(s => s.ticker === msg.data.ticker);
                        if (idx >= 0) { const n=[...prev]; n[idx]=msg.data; return n; }
                        return [msg.data, ...prev];
                    });
                    setLastUpdate(new Date());
                }
            };
            ws.onerror = () => setWsStatus('error');
            ws.onclose = () => {
                setWsStatus('reconnecting');
                retryTimer = setTimeout(connect, 4000);
            };
        }
        connect();
        return () => { ws?.close(); clearTimeout(retryTimer); };
    }, []);

    // REST fallback if WS snapshot empty after 5s
    React.useEffect(() => {
        const t = setTimeout(async () => {
            if (signals.length === 0) {
                try {
                    const r = await fetch(`${API}/signals`); bump('api_calls');
                    const d = await r.json();
                    if (d.signals?.length) setSignals(d.signals);
                } catch {}
            }
        }, 5000);
        return () => clearTimeout(t);
    }, [signals.length]);

    // Indices + Fear/Greed
    React.useEffect(() => {
        async function load() {
            try {
                const [ir, fr] = await Promise.all([
                    fetch(`${API}/indices`), fetch(`${API}/fear-greed`)
                ]);
                bump('api_calls'); bump('api_calls');
                setIndices(await ir.json());
                setFearGreed(await fr.json());
            } catch {}
        }
        load();
        const t = setInterval(load, 60000);
        return () => clearInterval(t);
    }, []);

    const refreshUsage = () => setUsage(getUsage());

    const analyzeSearch = async () => {
        if (!search.trim()) return;
        setSearchLoading(true); setSearchResult(null);
        try {
            const r = await fetch(`${API}/signals/${search.trim().toUpperCase()}`);
            const d = await r.json();
            bump('api_calls'); bump('stocks_analyzed');
            setSearchResult(d);
            refreshUsage();
        } catch { setSearchResult({ error: 'Failed' }); }
        setSearchLoading(false);
    };

    const buys  = signals.filter(s => s.action === 'BUY').sort((a,b) => b.score - a.score);
    const sells = signals.filter(s => s.action === 'SELL').sort((a,b) => a.score - b.score);
    const holds = signals.filter(s => s.action === 'HOLD');

    return (
        <div style={{ minHeight: '100vh' }}>
            {/* Header */}
            <header style={{ borderBottom: '1px solid #1e1e3a', background: '#080810ee', backdropFilter: 'blur(12px)', position: 'sticky', top: 0, zIndex: 100 }}>
                <div style={{ maxWidth: 1280, margin: '0 auto', padding: '12px 24px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                        <h1 className="glow-text" style={{ fontSize: 26, fontWeight: 900, letterSpacing: '-0.5px' }}>NEXUS</h1>
                        <span style={{ fontSize: 11, color: '#444', background: '#111120', border: '1px solid #1e1e3a', padding: '2px 8px', borderRadius: 99 }}>v3.0 • Live Intelligence</span>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                            <div className="live-dot" />
                            <span style={{ fontSize: 11, color: wsStatus === 'live' ? '#10b981' : '#f59e0b' }}>
                                {wsStatus === 'live' ? 'LIVE' : wsStatus === 'reconnecting' ? 'Reconnecting…' : 'Connecting…'}
                            </span>
                        </div>
                    </div>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 20 }}>
                        {fearGreed && <FearPill fg={fearGreed} />}
                        {lastUpdate && <span style={{ fontSize: 11, color: '#555' }}>Updated {lastUpdate.toLocaleTimeString()}</span>}
                    </div>
                </div>

                {/* Indices ticker */}
                <div style={{ borderTop: '1px solid #1e1e3a', display: 'flex', gap: 0, overflowX: 'auto', padding: '0 24px' }}>
                    {Object.entries(indices).map(([name, d]) => (
                        <div key={name} style={{ padding: '8px 20px', borderRight: '1px solid #1e1e3a', minWidth: 'fit-content' }}>
                            <div style={{ fontSize: 10, color: '#555', marginBottom: 2 }}>{name}</div>
                            <div style={{ fontSize: 13, fontWeight: 700, color: d.change_pct >= 0 ? '#10b981' : '#ef4444' }}>
                                {fmt(d.price, 0)} <span style={{ fontSize: 11 }}>{d.change_pct >= 0 ? '+' : ''}{fmt(d.change_pct)}%</span>
                            </div>
                        </div>
                    ))}
                </div>

                {/* Tabs */}
                <div style={{ display: 'flex', borderTop: '1px solid #1e1e3a', padding: '0 16px' }}>
                    {[['dashboard','📊 Dashboard'],['signals','🎯 Signals'],['search','🔍 Search'],['usage','📈 Usage']].map(([k,l]) => (
                        <button key={k} className={`tab-btn ${tab===k?'active':''}`} onClick={() => setTab(k)}>{l}</button>
                    ))}
                </div>
            </header>

            {/* Main */}
            <main style={{ maxWidth: 1280, margin: '0 auto', padding: '24px' }}>
                {tab === 'dashboard' && <Dashboard buys={buys} sells={sells} holds={holds} signals={signals} />}
                {tab === 'signals'   && <Signals signals={signals} />}
                {tab === 'search'    && <Search search={search} setSearch={setSearch} onAnalyze={analyzeSearch} loading={searchLoading} result={searchResult} />}
                {tab === 'usage'     && <UsageTab usage={usage} onReset={() => { localStorage.removeItem(todayKey()); refreshUsage(); }} />}
            </main>

            {/* Usage pill */}
            <UsagePill usage={usage} />
        </div>
    );
}

// ── Fear/Greed Pill ───────────────────────────────────────────────────────────
function FearPill({ fg }) {
    const c = fg.score > 55 ? '#10b981' : fg.score > 45 ? '#f59e0b' : '#ef4444';
    return (
        <div style={{ display: 'flex', alignItems: 'center', gap: 6, background: '#111120', border: `1px solid ${c}44`, borderRadius: 99, padding: '4px 12px' }}>
            <div style={{ width: 6, height: 6, borderRadius: '50%', background: c }} />
            <span style={{ fontSize: 11, color: c }}>{fg.label}</span>
            <span style={{ fontSize: 12, color: '#888', fontWeight: 700 }}>{fmt(fg.score, 0)}</span>
        </div>
    );
}

// ── Dashboard Tab ─────────────────────────────────────────────────────────────
function Dashboard({ buys, sells, holds, signals }) {
    return (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 24 }}>
            {/* Summary cards */}
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 16 }}>
                {[
                    { label: 'BUY Signals', value: buys.length, color: '#10b981' },
                    { label: 'SELL Signals', value: sells.length, color: '#ef4444' },
                    { label: 'HOLD Signals', value: holds.length, color: '#f59e0b' },
                    { label: 'Tracked Stocks', value: signals.length, color: '#00d4ff' },
                ].map(({ label, value, color }) => (
                    <div key={label} className="card" style={{ textAlign: 'center', padding: '20px 16px' }}>
                        <div style={{ fontSize: 36, fontWeight: 900, color }}>{value}</div>
                        <div style={{ fontSize: 12, color: '#666', marginTop: 4 }}>{label}</div>
                    </div>
                ))}
            </div>

            {/* Top BUYs */}
            {buys.length > 0 && (
                <section>
                    <h2 style={{ fontSize: 16, fontWeight: 700, marginBottom: 12, color: '#10b981' }}>🟢 Top BUY Opportunities</h2>
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))', gap: 12 }}>
                        {buys.slice(0, 6).map(s => <SignalCard key={s.ticker} sig={s} />)}
                    </div>
                </section>
            )}

            {/* Top SELLs */}
            {sells.length > 0 && (
                <section>
                    <h2 style={{ fontSize: 16, fontWeight: 700, marginBottom: 12, color: '#ef4444' }}>🔴 SELL / Avoid</h2>
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))', gap: 12 }}>
                        {sells.slice(0, 4).map(s => <SignalCard key={s.ticker} sig={s} />)}
                    </div>
                </section>
            )}

            {signals.length === 0 && (
                <div className="card" style={{ textAlign: 'center', padding: 48, color: '#444' }}>
                    <div style={{ fontSize: 32, marginBottom: 12 }}>⏳</div>
                    <div style={{ fontSize: 16, fontWeight: 600, marginBottom: 8 }}>Ingesting 50 stocks…</div>
                    <div style={{ fontSize: 13 }}>First load takes ~60s. Signals will stream in via WebSocket.</div>
                </div>
            )}
        </div>
    );
}

// ── Signals Tab ───────────────────────────────────────────────────────────────
function Signals({ signals }) {
    const [filter, setFilter] = React.useState('ALL');
    const [mkt, setMkt] = React.useState('ALL');

    const filtered = signals
        .filter(s => filter === 'ALL' || s.action === filter)
        .filter(s => mkt === 'ALL' || s.market === mkt)
        .sort((a,b) => b.score - a.score);

    return (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
            <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', alignItems: 'center' }}>
                {['ALL','BUY','HOLD','SELL'].map(f => (
                    <button key={f} onClick={() => setFilter(f)} style={{
                        padding: '6px 14px', borderRadius: 99, border: '1px solid',
                        fontSize: 12, fontWeight: 600, cursor: 'pointer',
                        background: filter===f ? (f==='BUY'?'#10b981':f==='SELL'?'#ef4444':f==='HOLD'?'#f59e0b':'#00d4ff') : 'transparent',
                        color: filter===f ? '#000' : '#888',
                        borderColor: filter===f ? 'transparent' : '#2a2a4a'
                    }}>{f} {f!=='ALL' ? signals.filter(s=>s.action===f).length : signals.length}</button>
                ))}
                <div style={{ width: 1, height: 20, background: '#2a2a4a', margin: '0 4px' }} />
                {['ALL','US','India'].map(m => (
                    <button key={m} onClick={() => setMkt(m)} style={{
                        padding: '6px 14px', borderRadius: 99, border: '1px solid',
                        fontSize: 12, cursor: 'pointer',
                        background: mkt===m ? '#7b61ff' : 'transparent',
                        color: mkt===m ? '#fff' : '#888',
                        borderColor: mkt===m ? 'transparent' : '#2a2a4a'
                    }}>{m}</button>
                ))}
                <span style={{ marginLeft: 'auto', fontSize: 12, color: '#555' }}>{filtered.length} stocks</span>
            </div>

            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))', gap: 12 }}>
                {filtered.map(s => <SignalCard key={s.ticker} sig={s} />)}
            </div>

            {filtered.length === 0 && (
                <div className="card" style={{ textAlign: 'center', padding: 40, color: '#555' }}>
                    No signals yet. Ingestion running…
                </div>
            )}
        </div>
    );
}

// ── Signal Card ───────────────────────────────────────────────────────────────
function SignalCard({ sig }) {
    const [open, setOpen] = React.useState(false);
    const ac = sig.action;
    const cls = ac==='BUY' ? 'buy-glow' : ac==='SELL' ? 'sell-glow' : 'hold-glow';
    const badgeCls = ac==='BUY' ? 'badge-buy' : ac==='SELL' ? 'badge-sell' : 'badge-hold';
    const sc = scoreColor(sig.score);
    const cur = currency(sig);

    return (
        <div className={`card ${cls} fade-in`} style={{ cursor: 'pointer' }} onClick={() => setOpen(!open)}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 12 }}>
                <div>
                    <div style={{ fontWeight: 800, fontSize: 16 }}>{sig.ticker}</div>
                    <div style={{ fontSize: 11, color: '#555', marginTop: 2 }}>{sig.market} • {sig.confidence} confidence</div>
                </div>
                <span className={badgeCls} style={{ padding: '4px 10px', borderRadius: 99, fontSize: 12, fontWeight: 700 }}>{ac}</span>
            </div>

            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8, fontSize: 13, marginBottom: 12 }}>
                <div>
                    <div style={{ color: '#555', fontSize: 11 }}>Price</div>
                    <div style={{ fontWeight: 700 }}>{cur}{fmt(sig.price)}</div>
                </div>
                <div>
                    <div style={{ color: '#555', fontSize: 11 }}>Day</div>
                    <div style={{ fontWeight: 700, color: sig.change_pct >= 0 ? '#10b981' : '#ef4444' }}>
                        {sig.change_pct >= 0 ? '+' : ''}{fmt(sig.change_pct)}%
                    </div>
                </div>
                <div>
                    <div style={{ color: '#555', fontSize: 11 }}>RSI</div>
                    <div style={{ fontWeight: 700, color: sig.rsi < 30 ? '#10b981' : sig.rsi > 70 ? '#ef4444' : '#e8e8f0' }}>{fmt(sig.rsi, 1)}</div>
                </div>
                <div>
                    <div style={{ color: '#555', fontSize: 11 }}>1M</div>
                    <div style={{ fontWeight: 700, color: sig.momentum_1m >= 0 ? '#10b981' : '#ef4444' }}>
                        {sig.momentum_1m >= 0 ? '+' : ''}{fmt(sig.momentum_1m)}%
                    </div>
                </div>
            </div>

            {/* Score bar */}
            <div>
                <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 11, marginBottom: 4 }}>
                    <span style={{ color: '#555' }}>Signal Score</span>
                    <span style={{ color: sc, fontWeight: 700 }}>{sig.score > 0 ? '+' : ''}{fmt(sig.score, 1)}</span>
                </div>
                <div className="score-bar-wrap">
                    <div className="score-bar" style={{ width: `${scoreWidth(sig.score)}%`, background: sc }} />
                </div>
            </div>

            {/* Details expanded */}
            {open && sig.details && (
                <div style={{ marginTop: 12, paddingTop: 12, borderTop: '1px solid #1e1e3a' }}>
                    {Object.entries(sig.details).map(([k, v]) => (
                        <div key={k} style={{ display: 'flex', justifyContent: 'space-between', fontSize: 11, padding: '2px 0', color: '#777' }}>
                            <span style={{ textTransform: 'uppercase', letterSpacing: '0.05em' }}>{k}</span>
                            <span style={{ color: v.includes('+') ? '#10b981' : v.includes('-') && !v.includes('(-0') ? '#ef4444' : '#888' }}>{v}</span>
                        </div>
                    ))}
                    <div style={{ fontSize: 10, color: '#444', marginTop: 6 }}>
                        Updated {sig.updated_at ? new Date(sig.updated_at).toLocaleTimeString() : '—'}
                    </div>
                </div>
            )}
        </div>
    );
}

// ── Search Tab ────────────────────────────────────────────────────────────────
function Search({ search, setSearch, onAnalyze, loading, result }) {
    return (
        <div style={{ maxWidth: 600 }}>
            <h2 style={{ fontSize: 18, fontWeight: 700, marginBottom: 16 }}>Search Any Stock</h2>
            <div style={{ display: 'flex', gap: 8, marginBottom: 24 }}>
                <input
                    style={{ flex: 1 }}
                    placeholder="AAPL, RELIANCE.NS, NVDA…"
                    value={search}
                    onChange={e => setSearch(e.target.value)}
                    onKeyDown={e => e.key === 'Enter' && onAnalyze()}
                />
                <button className="btn-primary" onClick={onAnalyze} disabled={loading}>
                    {loading ? '⏳' : '🔍'} Analyze
                </button>
            </div>

            {result && !result.error && (
                <div className="fade-in">
                    <SignalCard sig={result} />
                </div>
            )}
            {result?.error && (
                <div className="card" style={{ color: '#ef4444', textAlign: 'center', padding: 24 }}>
                    Could not fetch data. Check the ticker symbol.
                </div>
            )}
            {!result && (
                <div className="card" style={{ color: '#444', textAlign: 'center', padding: 32, fontSize: 13 }}>
                    Enter any ticker for a live 8-factor signal analysis
                </div>
            )}
        </div>
    );
}

// ── Usage Tab ─────────────────────────────────────────────────────────────────
function UsageTab({ usage, onReset }) {
    const mins = Math.floor((Date.now() - (usage.t0 || Date.now())) / 60000);
    const Bar = ({ label, val, limit, color }) => {
        const pct = Math.min(100, (val / limit) * 100);
        return (
            <div style={{ marginBottom: 16 }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 13, marginBottom: 6 }}>
                    <span style={{ color: '#aaa' }}>{label}</span>
                    <span style={{ color: pct >= 80 ? '#ef4444' : color, fontWeight: 700 }}>{val} / {limit}</span>
                </div>
                <div className="score-bar-wrap" style={{ height: 10 }}>
                    <div className="score-bar" style={{ width: `${pct}%`, background: pct >= 80 ? '#ef4444' : color }} />
                </div>
                <div style={{ fontSize: 11, color: '#555', marginTop: 4 }}>{pct.toFixed(0)}% of daily limit</div>
            </div>
        );
    };
    return (
        <div style={{ maxWidth: 480 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
                <h2 style={{ fontSize: 18, fontWeight: 700 }}>Daily Usage</h2>
                <span style={{ fontSize: 12, color: '#555' }}>⏱ Session: {mins}m</span>
            </div>
            <div className="card" style={{ padding: 24 }}>
                <Bar label="API Calls" val={usage.api_calls||0} limit={LIMITS.api_calls} color="#00d4ff" />
                <Bar label="Stocks Analyzed (Search)" val={usage.stocks_analyzed||0} limit={LIMITS.stocks_analyzed} color="#10b981" />
                <div style={{ borderTop: '1px solid #1e1e3a', paddingTop: 16, marginTop: 8, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                    <span style={{ fontSize: 12, color: '#555' }}>Resets at midnight</span>
                    <button onClick={onReset} style={{ background: '#1a1a2e', border: '1px solid #2a2a4a', borderRadius: 6, color: '#888', fontSize: 12, padding: '6px 14px', cursor: 'pointer' }}>Reset</button>
                </div>
            </div>
        </div>
    );
}

// ── Usage Pill (floating) ─────────────────────────────────────────────────────
function UsagePill({ usage }) {
    const [exp, setExp] = React.useState(false);
    const pct = Math.round(((usage.api_calls||0) / LIMITS.api_calls) * 100);
    const warn = pct >= 80;
    return (
        <div style={{ position: 'fixed', bottom: 20, right: 20, zIndex: 999, background: '#111120', border: '1px solid #1e1e3a', borderRadius: 12, boxShadow: '0 4px 24px #0008' }}>
            {!exp ? (
                <button onClick={() => setExp(true)} style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '8px 14px', background: 'none', border: 'none', cursor: 'pointer', color: 'white' }}>
                    <span>📊</span>
                    <span style={{ fontSize: 12, color: '#888' }}>Usage</span>
                    <span style={{ fontSize: 11, fontWeight: 700, color: warn ? '#ef4444' : '#00d4ff', background: warn ? '#ef444422' : '#00d4ff22', padding: '2px 7px', borderRadius: 99 }}>{pct}%</span>
                </button>
            ) : (
                <div style={{ padding: '14px 16px', minWidth: 220 }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
                        <span style={{ fontWeight: 700, fontSize: 13, color: '#00d4ff' }}>📊 Usage Today</span>
                        <button onClick={() => setExp(false)} style={{ background: 'none', border: 'none', color: '#666', cursor: 'pointer', fontSize: 16 }}>✕</button>
                    </div>
                    {[['API Calls', usage.api_calls||0, LIMITS.api_calls, '#00d4ff'],
                      ['Analyzed', usage.stocks_analyzed||0, LIMITS.stocks_analyzed, '#10b981']].map(([l,v,lim,c]) => (
                        <div key={l} style={{ marginBottom: 10 }}>
                            <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 11, marginBottom: 3 }}>
                                <span style={{ color: '#888' }}>{l}</span>
                                <span style={{ color: c }}>{v}/{lim}</span>
                            </div>
                            <div style={{ background: '#1a1a2e', borderRadius: 99, height: 5, overflow: 'hidden' }}>
                                <div style={{ width: `${Math.min(100,(v/lim)*100)}%`, height: '100%', background: c, borderRadius: 99 }} />
                            </div>
                        </div>
                    ))}
                </div>
            )}
        </div>
    );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
