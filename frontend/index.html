<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS - Advanced Stock Intelligence</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lightweight-charts@4/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #0a0a0a;
            color: #f0f0f0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
        }
        .gradient-text {
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 16px;
            transition: all 0.3s ease;
        }
        .card:hover {
            border-color: #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.1);
        }
        .buy-border { border-left: 4px solid #10b981; }
        .sell-border { border-left: 4px solid #ef4444; }
        .hold-border { border-left: 4px solid #f59e0b; }
        .button {
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.2s;
        }
        .button:hover { opacity: 0.8; }
        .tab-button {
            padding: 12px 20px;
            border: none;
            background: transparent;
            color: #888;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.3s;
        }
        .tab-button.active {
            color: #00d4ff;
            border-bottom-color: #00d4ff;
        }
        .loading {
            display: inline-block;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .gauge {
            width: 200px;
            height: 100px;
            background: conic-gradient(
                #ef4444 0deg 90deg,
                #f59e0b 90deg 180deg,
                #10b981 180deg 270deg,
                #10b981 270deg 360deg
            );
            border-radius: 100px 100px 0 0;
            position: relative;
        }
        .gauge-needle {
            position: absolute;
            width: 4px;
            height: 80px;
            background: white;
            bottom: 0;
            left: 50%;
            transform-origin: bottom center;
            transform: translateX(-2px) rotate(var(--rotation));
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const API_BASE = 'https://nexus-api-mnoq.onrender.com';

        function App() {
            const [activeTab, setActiveTab] = React.useState('dashboard');
            const [portfolio, setPortfolio] = React.useState([]);
            const [loading, setLoading] = React.useState(false);
            const [searchTicker, setSearchTicker] = React.useState('');
            const [indices, setIndices] = React.useState({});
            const [fearGreed, setFearGreed] = React.useState(50);
            const [macro, setMacro] = React.useState({});

            // Fetch data on mount
            React.useEffect(() => {
                fetchPortfolio();
                fetchIndices();
                fetchFearGreed();
                fetchMacro();

                const interval = setInterval(() => {
                    fetchPortfolio();
                    fetchIndices();
                }, 30000); // Refresh every 30s

                return () => clearInterval(interval);
            }, []);

            const fetchPortfolio = async () => {
                try {
                    const res = await fetch(`${API_BASE}/portfolio`);
                    const data = await res.json();
                    setPortfolio(data.portfolio || []);
                } catch (e) {
                    console.error('Portfolio fetch error:', e);
                }
            };

            const fetchIndices = async () => {
                try {
                    const res = await fetch(`${API_BASE}/indices`);
                    const data = await res.json();
                    setIndices(data);
                } catch (e) {
                    console.error('Indices fetch error:', e);
                }
            };

            const fetchFearGreed = async () => {
                try {
                    const res = await fetch(`${API_BASE}/fear-greed`);
                    const data = await res.json();
                    setFearGreed(data.score || 50);
                } catch (e) {
                    console.error('Fear/Greed fetch error:', e);
                }
            };

            const fetchMacro = async () => {
                try {
                    const res = await fetch(`${API_BASE}/macro`);
                    const data = await res.json();
                    setMacro(data);
                } catch (e) {
                    console.error('Macro fetch error:', e);
                }
            };

            const analyzeStock = async () => {
                if (!searchTicker) return;
                setLoading(true);
                try {
                    const res = await fetch(`${API_BASE}/analyze/${searchTicker.toUpperCase()}`);
                    const data = await res.json();
                    console.log('Analysis:', data);
                    // Could show modal with results
                    alert(`${searchTicker}: ${data.composite.action} (${data.composite.score}/10)`);
                } catch (e) {
                    alert('Error analyzing ticker');
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="min-h-screen bg-black text-white">
                    {/* Header */}
                    <header className="border-b border-gray-800 bg-black/50 backdrop-blur sticky top-0 z-50">
                        <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <h1 className="text-3xl font-bold gradient-text">NEXUS</h1>
                                <span className="text-sm text-gray-500">v2.0 • Stock Intelligence</span>
                            </div>
                            <div className="flex items-center gap-6">
                                <FearGaugeWidget value={fearGreed} />
                                <div className="text-sm">
                                    <div className="text-gray-500">Market Status</div>
                                    <div className="text-green-400">Open</div>
                                </div>
                            </div>
                        </div>

                        {/* Indices Bar */}
                        <div className="border-t border-gray-800 flex overflow-x-auto gap-6 px-6 py-3 text-sm">
                            {Object.entries(indices).map(([name, data]) => (
                                <div key={name} className="whitespace-nowrap">
                                    <div className="text-gray-500">{name}</div>
                                    <div className={data.change_pct > 0 ? 'text-green-400' : 'text-red-400'}>
                                        ${data.price?.toFixed(2)} {data.change_pct > 0 ? '+' : ''}{data.change_pct?.toFixed(2)}%
                                    </div>
                                </div>
                            ))}
                        </div>
                    </header>

                    {/* Tabs */}
                    <div className="border-b border-gray-800 sticky top-20 z-40 bg-black/50 backdrop-blur">
                        <div className="max-w-7xl mx-auto flex">
                            {['dashboard', 'portfolio', 'search', 'macro', 'backtests'].map(tab => (
                                <button
                                    key={tab}
                                    className={`tab-button capitalize ${activeTab === tab ? 'active' : ''}`}
                                    onClick={() => setActiveTab(tab)}
                                >
                                    {tab === 'dashboard' ? '📊 Dashboard' :
                                     tab === 'portfolio' ? '💼 Portfolio' :
                                     tab === 'search' ? '🔍 Search' :
                                     tab === 'macro' ? '🌍 Macro' :
                                     '📈 Backtests'}
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* Main Content */}
                    <main className="max-w-7xl mx-auto px-6 py-8">
                        {activeTab === 'dashboard' && (
                            <DashboardTab portfolio={portfolio} />
                        )}

                        {activeTab === 'portfolio' && (
                            <PortfolioTab portfolio={portfolio} onRefresh={fetchPortfolio} />
                        )}

                        {activeTab === 'search' && (
                            <SearchTab
                                ticker={searchTicker}
                                onTickerChange={setSearchTicker}
                                onAnalyze={analyzeStock}
                                loading={loading}
                            />
                        )}

                        {activeTab === 'macro' && (
                            <MacroTab macro={macro} fearGreed={fearGreed} />
                        )}

                        {activeTab === 'backtests' && (
                            <BacktestsTab />
                        )}
                    </main>
                </div>
            );
        }

        function FearGaugeWidget({ value }) {
            const rotation = (value / 100) * 180 - 90;
            const label = value >= 75 ? 'Extreme Greed' :
                         value >= 55 ? 'Greed' :
                         value >= 45 ? 'Neutral' :
                         value >= 25 ? 'Fear' :
                         'Extreme Fear';

            return (
                <div className="text-center">
                    <div style={{
                        width: '100px',
                        height: '50px',
                        background: 'conic-gradient(#ef4444 0deg 90deg, #f59e0b 90deg 180deg, #10b981 180deg 270deg, #10b981 270deg 360deg)',
                        borderRadius: '50px 50px 0 0',
                        position: 'relative'
                    }}>
                        <div style={{
                            position: 'absolute',
                            width: '3px',
                            height: '40px',
                            background: 'white',
                            bottom: 0,
                            left: '50%',
                            transformOrigin: 'bottom center',
                            transform: `translateX(-1.5px) rotate(${rotation}deg)`
                        }} />
                    </div>
                    <div className="text-xs text-gray-500 mt-1">{label}</div>
                </div>
            );
        }

        function DashboardTab({ portfolio }) {
            const buys = portfolio.filter(p => p.latest_signal?.action === 'BUY');
            const sells = portfolio.filter(p => p.latest_signal?.action === 'SELL');
            const holds = portfolio.filter(p => p.latest_signal?.action === 'HOLD');

            return (
                <div className="space-y-6">
                    {/* Summary */}
                    <div className="grid grid-cols-3 gap-4">
                        <div className="card">
                            <div className="text-sm text-gray-500">BUY Signals</div>
                            <div className="text-3xl font-bold text-green-400">{buys.length}</div>
                        </div>
                        <div className="card">
                            <div className="text-sm text-gray-500">SELL Signals</div>
                            <div className="text-3xl font-bold text-red-400">{sells.length}</div>
                        </div>
                        <div className="card">
                            <div className="text-sm text-gray-500">HOLD Signals</div>
                            <div className="text-3xl font-bold text-yellow-400">{holds.length}</div>
                        </div>
                    </div>

                    {/* Holdings */}
                    <div className="space-y-4">
                        <h2 className="text-xl font-bold">Your Holdings</h2>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                            {portfolio.map(item => (
                                <StockCard key={item.ticker} item={item} />
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        function StockCard({ item }) {
            const signal = item.latest_signal || {};
            const borderClass = signal.action === 'BUY' ? 'buy-border' :
                               signal.action === 'SELL' ? 'sell-border' :
                               'hold-border';
            const badge = signal.action === 'BUY' ? '🟢' :
                         signal.action === 'SELL' ? '🔴' : '🟡';

            return (
                <div className={`card ${borderClass}`}>
                    <div className="flex justify-between items-start mb-4">
                        <div>
                            <h3 className="text-lg font-bold">{item.ticker}</h3>
                            <div className="text-sm text-gray-500">{item.market}</div>
                        </div>
                        <div className="text-2xl">{badge}</div>
                    </div>

                    <div className="space-y-2 text-sm">
                        <div className="flex justify-between">
                            <span className="text-gray-500">Signal:</span>
                            <span className="font-semibold">{signal.action || 'N/A'}</span>
                        </div>
                        <div className="flex justify-between">
                            <span className="text-gray-500">Score:</span>
                            <span className="font-semibold">{signal.score?.toFixed(1) || '—'}/10</span>
                        </div>
                        <div className="flex justify-between">
                            <span className="text-gray-500">Confidence:</span>
                            <span className="font-semibold">{signal.confidence || '—'}</span>
                        </div>
                    </div>
                </div>
            );
        }

        function PortfolioTab({ portfolio, onRefresh }) {
            return (
                <div className="space-y-6">
                    <div className="flex justify-between items-center">
                        <h2 className="text-xl font-bold">Portfolio Manager</h2>
                        <button className="button" onClick={onRefresh}>Refresh</button>
                    </div>

                    <div className="card">
                        <h3 className="font-semibold mb-4">Holdings</h3>
                        <div className="space-y-2">
                            {portfolio.length === 0 ? (
                                <p className="text-gray-500">No holdings. Add stocks via the Search tab.</p>
                            ) : (
                                portfolio.map(item => (
                                    <div key={item.ticker} className="flex justify-between p-3 bg-black rounded">
                                        <span>{item.ticker}</span>
                                        <span>{item.latest_signal?.action || 'N/A'}</span>
                                    </div>
                                ))
                            )}
                        </div>
                    </div>

                    <div className="grid grid-cols-2 gap-4">
                        <div className="card">
                            <h3 className="font-semibold mb-2">Total Holdings</h3>
                            <div className="text-2xl font-bold">{portfolio.length}</div>
                        </div>
                        <div className="card">
                            <h3 className="font-semibold mb-2">Last Updated</h3>
                            <div className="text-sm text-gray-500">{new Date().toLocaleTimeString()}</div>
                        </div>
                    </div>
                </div>
            );
        }

        function SearchTab({ ticker, onTickerChange, onAnalyze, loading }) {
            return (
                <div className="max-w-2xl space-y-6">
                    <div>
                        <h2 className="text-xl font-bold mb-4">Search & Analyze</h2>
                        <div className="flex gap-2">
                            <input
                                type="text"
                                placeholder="Enter ticker (e.g., AAPL, RELIANCE.NS)"
                                value={ticker}
                                onChange={e => onTickerChange(e.target.value)}
                                onKeyPress={e => e.key === 'Enter' && onAnalyze()}
                                className="flex-1 bg-black border border-gray-700 rounded px-4 py-2 text-white focus:outline-none focus:border-cyan-500"
                            />
                            <button
                                className="button"
                                onClick={onAnalyze}
                                disabled={loading}
                            >
                                {loading ? '⏳' : '🔍'} Analyze
                            </button>
                        </div>
                    </div>

                    {/* Results would show here */}
                    <div className="card text-center text-gray-500">
                        Enter a ticker to see 10-layer analysis breakdown
                    </div>
                </div>
            );
        }

        function MacroTab({ macro, fearGreed }) {
            return (
                <div className="space-y-6">
                    <h2 className="text-xl font-bold">Global Macro Analysis</h2>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div className="card">
                            <h3 className="font-semibold mb-4">Market Regime</h3>
                            <div className="text-center py-4">
                                <div className="text-2xl mb-2">{macro.regime?.label || '🔄'}</div>
                                <div className="text-sm text-gray-500">{macro.regime?.description || 'Analyzing...'}</div>
                            </div>
                        </div>

                        <div className="card">
                            <h3 className="font-semibold mb-4">Fear & Greed</h3>
                            <div className="text-center">
                                <FearGaugeWidget value={fearGreed} />
                                <div className="text-2xl font-bold mt-4">{fearGreed.toFixed(0)}/100</div>
                            </div>
                        </div>
                    </div>

                    <div className="card">
                        <h3 className="font-semibold mb-4">Sector Performance</h3>
                        <div className="space-y-2">
                            {macro.sectors && Object.entries(macro.sectors).slice(0, 5).map(([sector, perf]) => (
                                <div key={sector} className="flex justify-between">
                                    <span>{sector}</span>
                                    <span className={perf > 0 ? 'text-green-400' : 'text-red-400'}>
                                        {perf > 0 ? '+' : ''}{perf.toFixed(2)}%
                                    </span>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        function BacktestsTab() {
            return (
                <div className="card text-center">
                    <h2 className="text-xl font-bold mb-4">Backtest Results</h2>
                    <p className="text-gray-500">Select a stock from your portfolio to view backtest results</p>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
